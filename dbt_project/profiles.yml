# dbt_project/profiles.yml - FINAL VERSION

football_analytics_platform:
  target: dev
  outputs:
    dev:
      type: duckdb
      # New path: relative to dbt_project, goes up one and into dashboard
      path: '../dashboard/dbt.duckdb'
      settings:
        s3_region: "{{ env_var('AWS_REGION') }}"
        s3_access_key_id: "{{ env_var('AWS_ACCESS_KEY_ID') }}"
        s3_secret_access_key: "{{ env_var('AWS_SECRET_ACCESS_KEY') }}"

    prod:
      type: duckdb
      # New path: absolute path inside the container to the dashboard folder
      path: '/opt/airflow/dashboard/dbt.duckdb'
      settings:
        s3_region: "{{ env_var('AWS_REGION') }}"
        s3_access_key_id: "{{ env_var('AWS_ACCESS_KEY_ID') }}"
        s3_secret_access_key: "{{ env_var('AWS_SECRET_ACCESS_KEY') }}"