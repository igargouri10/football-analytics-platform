version: 2
models:
- name: fct_matches
  description: Fact table containing all finished football matches.
  columns:
  - name: match_id
    description: The unique identifier for a match.
    tests:
    - unique
    - not_null
  - name: league_id
    tests:
    - not_null
  - name: season
    tests:
    - not_null
  - name: match_date
    tests:
    - not_null
  - name: match_status
    tests:
    - not_null
    - accepted_values:
        values:
        - Match Finished
        - Postponed
        - Cancelled
        - Scheduled
  - name: home_team_id
    tests:
    - not_null
  - name: home_team_name
    tests:
    - not_null
  - name: home_team_score
    tests:
    - not_null
  - name: away_team_id
    tests:
    - not_null
  - name: away_team_name
    tests:
    - not_null
  - name: away_team_score
    tests:
    - not_null
- name: dim_teams
  description: Dimension table for football teams.
  columns:
  - name: team_id
    description: The unique identifier for a team.
    tests:
    - unique
    - not_null
  - name: team_name
    tests:
    - not_null
